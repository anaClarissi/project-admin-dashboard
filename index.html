<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Admin Dashboard</title>

    <!-- ROBOTO FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- STYLE CSS -->
    <link rel="stylesheet" href="src/css/style.css">

</head>
<body>

    <div class="container-fluid" id="container">

        <header id="header">

            <div class="container-fluid">

                <div class="search-area">

                    <i class="bi bi-search"></i>

                    <input type="text" name="" id="">

                </div>

                <div class="user-secondary-area">

                    <a href="#" class="btn notify"><i class="bi bi-bell"></i></a>

                    <a href="" class="btn perfil">

                        <img src="src/images/cat.jpg" alt="Cat" class="cat-img">

                        <h3>Morgan Oakley</h3>

                    </a>

                </div>

            </div>

            <div class="container-fluid">

                <div class="user-primary-area">

                    <img src="src/images/cat.jpg" alt="Cat" class="cat-img">

                    <div class="user-data">

                        <p>Hi there, </p>

                        <h2>Morgan Oakley (@morgan)</h2>

                    </div>

                </div>

                <div class="user-actions">

                    <a href="#" class="btn">New</a>
                    
                    <a href="#" class="btn">Upload</a>
                    
                    <a href="#" class="btn">Share</a>

                </div>

            </div>

        </header>

        <aside id="aside">
            
            <div class="container-fluid" id="logo-area">

                <a href=".">

                    <i class="bi bi-window-sidebar"></i>

                    <h1>Dashboard</h1>

                </a>

            </div>

            <div class="container-fluid" id="primary-links">

                <ul class="list-unstyled">

                    <li>

                        <a href="#">

                            <i class="bi bi-house-door-fill"></i>

                            <p>Home</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-person-lines-fill"></i>

                            <p>Profile</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-chat-right-fill"></i>

                            <p>Messages</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-clock-fill"></i>

                            <p>History</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-card-checklist"></i>

                            <p>Tasks</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-people-fill"></i>

                            <p>Communities</p>

                        </a>

                    </li>

                </ul>

            </div>

            <div class="container-fluid" id="secondary-links">

                <ul class="list-unstyled">

                    <li>

                        <a href="#">

                            <i class="bi bi-gear-fill"></i>

                            <p>Settings</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-question-square-fill"></i>

                            <p>Support</p>

                        </a>

                    </li>
                    <li>

                        <a href="#">

                            <i class="bi bi-shield-fill-check"></i>

                            <p>Privacy</p>

                        </a>

                    </li>

                </ul>

            </div>

        </aside>

        <main id="main"><h2>Main</h2></main>

    </div>

</body>
</html>
